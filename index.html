<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Step Sequencer</title>
    <meta name="description" content="Making an instrument with the Web Audio API" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="stylesheet" type="text/css" href="/app.css" />
  </head>
  <body>
    <div class="loading">
      <p>Loading...</p>
    </div>

    <div id="sequencer">
      
      <section class="controls-main">
        <h1>JR-808</h1>
        <label for="bpm">BPM</label>
        <input
          name="bpm"
          id="bpm"
          type="range"
          min="60"
          max="180"
          value="120"
          step="1" />
        <span id="bpmval">120</span>
        <input type="checkbox" id="playBtn" />
        <label for="playBtn">Play</label>
      </section>

      <select id="instrument">
        <option value="0">AC</option>
        <option value="1">BD</option>
        <option value="2">SD</option>
        <option value="3">LT</option>
        <option value="4">MT</option>
        <option value="5">HT</option>
        <option value="6">RS</option>
        <option value="7">CP</option>
        <option value="8">CB</option>
        <option value="9">CY</option>
        <option value="10">OH</option>
        <option value="11">CH</option>
      </select>

      <div id="tracks">
        <!-- track one: bleep -->
        <section class="track-one">
          <h2>Sweep</h2>
          <section class="controls">
            <label for="attack">Att</label>
            <input
              name="attack"
              id="attack"
              type="range"
              min="0"
              max="1"
              value="0.2"
              step="0.1" />
            <label for="release">Rel</label>
            <input
              name="release"
              id="release"
              type="range"
              min="0"
              max="1"
              value="0.5"
              step="0.1" />
          </section>

          <section class="pads">
            <input type="checkbox" id="v1n1" value="0" class="step" />
            <label for="v1n1">Voice 1, Note 1</label>

            <input type="checkbox" id="v1n2" value="1" class="step" />
            <label for="v1n2">Voice 1, Note 2</label>

            <input type="checkbox" id="v1n3" value="2" class="step" />
            <label for="v1n3">Voice 1, Note 3</label>

            <input type="checkbox" id="v1n4" value="3" class="step" />
            <label for="v1n4">Voice 1, Note 4</label>

            <input type="checkbox" id="v1n5" value="4" class="step" />
            <label for="v1n5">Voice 1, Note 5</label>
            
            <input type="checkbox" id="v1n6" value="5" class="step" />
            <label for="v1n6">Voice 1, Note 6</label>
            
            <input type="checkbox" id="v1n7" value="6" class="step" />
            <label for="v1n7">Voice 1, Note 7</label>
            
            <input type="checkbox" id="v1n8" value="7" class="step" />
            <label for="v1n8">Voice 1, Note 8</label>

            <input type="checkbox" id="v1n9" value="8" class="step" />
            <label for="v1n9">Voice 1, Note 9</label>
            
            <input type="checkbox" id="v1n10" value="9" class="step" />
            <label for="v1n10">Voice 1, Note 10</label>
            
            <input type="checkbox" id="v1n11" value="10" class="step" />
            <label for="v1n11">Voice 1, Note 11</label>
            
            <input type="checkbox" id="v1n12" value="11" class="step" />
            <label for="v1n12">Voice 1, Note 12</label>

            <input type="checkbox" id="v1n13" value="12" class="step" />
            <label for="v1n13">Voice 1, Note 13</label>
            
            <input type="checkbox" id="v1n14" value="13" class="step" />
            <label for="v1n14">Voice 1, Note 14</label>
            
            <input type="checkbox" id="v1n15" value="14" class="step" />
            <label for="v1n15">Voice 1, Note 15</label>
            
            <input type="checkbox" id="v1n16" value="15" class="step" />
            <label for="v1n16">Voice 1, Note 16</label>

          </section>
        </section>
        
      </div>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
